name: Build & Deploy (Self-Hosted Runner)

on:
  push:
    branches: ["main"]

# Required so GITHUB_TOKEN can push to GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    # 👇 Use your self-hosted runner
    runs-on: self-hosted

    steps:
      # --------------------------------------------------------
      # 1. Checkout repository
      # --------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # 2. Login to GHCR (GitHub Container Registry)
      # --------------------------------------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------
      # 3. Build & Push Docker image (using runner’s Docker)
      # --------------------------------------------------------
      - name: Build & Push Docker Image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/clmlab-site:latest
          echo "Building image: $IMAGE"
          docker build -t "$IMAGE" .
          echo "Pushing image..."
          docker push "$IMAGE"

      # --------------------------------------------------------
      # 4. Configure kubectl using KUBECONFIG secret
      # --------------------------------------------------------
      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config
          echo "Kubeconfig configured"
          kubectl config get-contexts

      # --------------------------------------------------------
      # 5. Deploy updated image to Kubernetes
      # --------------------------------------------------------
      - name: Deploy to Kubernetes
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/clmlab-site:latest
          echo "Updating Deployment to image: $IMAGE"
          kubectl -n webserver-tls set image deployment/webserver \
            webserver="$IMAGE"
          
          echo "Waiting for rollout..."
          kubectl -n webserver-tls rollout status deployment/webserver

          echo "Deployment completed!"
