name: Build & Deploy

on:
  push:
    branches: ["main"]

# IMPORTANT: grant packages:write so the GITHUB_TOKEN can push to GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sanity check build context (optional but helpful)
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f -print | sort

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/clmlab-site:latest
          echo "Building and pushing $IMAGE"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config get-contexts

      - name: Apply Deployment (rolling update)
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/clmlab-site:latest
          kubectl set image deployment/webserver \
            webserver="$IMAGE" \
            -n webserver-tls
          kubectl rollout status deployment/webserver -n webserver-tls
