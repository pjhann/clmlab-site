name: Build & Deploy to Kubernetes

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    name: Build Docker image and deploy to Kubernetes
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # 1. Checkout repository
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # 2. Log in to GHCR (GitHub Container Registry)
      # --------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------
      # 3. Build and push Docker image
      # --------------------------
      - name: Build & Push Docker Image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/clmlab-site:latest
          echo "Building image: $IMAGE"
          docker build -t $IMAGE .
          docker push $IMAGE

      # --------------------------
      # 4. Configure kubectl (using kubeconfig from GitHub secret)
      # --------------------------
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config get-contexts

      # --------------------------
      # 5. Deploy to Kubernetes
      # --------------------------
      - name: Deploy New Image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/clmlab-site:latest
          echo "Deploying image: $IMAGE"

          # Update deployment image
          kubectl set image deployment/webserver \
            webserver=$IMAGE \
            -n webserver-tls

          # Wait for rollout
          kubectl rollout status deployment/webserver -n webserver-tls
