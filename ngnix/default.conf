server {
    # NGINX listens on non‑root port (compatible with runAsNonRoot: true)
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _;

    # Website root (static content baked into Docker image)
    root /usr/share/nginx/html;
    index index.html;

    # ------------------------------------------------------
    # Security Headers (safe defaults for static sites)
    # ------------------------------------------------------
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ------------------------------------------------------
    # Health Endpoint for Kubernetes Probes
    # /health → readiness + liveness
    # ------------------------------------------------------
    location /health {
        default_type text/plain;
        return 200 "OK\n";
    }

    # ------------------------------------------------------
    # Static File Handling
    # try_files ensures:
    #   - Try direct file
    #   - Try directory
    #   - Else trigger 404
    # ------------------------------------------------------
    location / {
        try_files $uri $uri/ =404;
    }

    # ------------------------------------------------------
    # Custom 404 Page
    # (You must provide /usr/share/nginx/html/404.html)
    # ------------------------------------------------------
    error_page 404 /404.html;

    # Hide direct access if needed
    location = /404.html {
        internal;
    }
}